services:
  app:
    build: .
    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/user_order_db
      DB_USERNAME: root
      DB_PASSWORD: root1234
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - mysql
      - redis

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: user_order_db
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    volumes:
      - redis-data:/data
